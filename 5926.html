<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Student Login Area</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; }

    /* ══ TOP HEADER ══ */
    .top-header {
      background: #008080; height: 50px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-title { color: #fff; font-size: 1rem; font-weight: 700; }
    .hamburger { color: #fff; font-size: 1.3rem; cursor: pointer; }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .header-right .icon-btn { color: #fff; font-size: 1.15rem; cursor: pointer; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; background: #ccc; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ══ LAYOUT ══ */
    .layout { display: flex; margin-top: 50px; min-height: calc(100vh - 50px); }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 188px; background: #1a1aff; flex-shrink: 0;
      position: fixed; top: 50px; left: 0; bottom: 0;
      z-index: 90; overflow-y: auto; transition: transform 0.28s ease;
    }
    .sidebar-school { background: #0000cc; padding: 10px 12px 8px; border-bottom: 2px solid rgba(255,255,255,0.15); }
    .sidebar-school .sname { color: #fff; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.4; }
    .sidebar-school .session { color: #fff; font-size: 0.65rem; font-weight: 600; margin-top: 3px; }
    .sidebar-school .session span { color: #FFE135; font-weight: 800; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; color: #fff; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: background 0.15s; text-decoration: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.12); }
    .nav-item.active { background: rgba(255,255,255,0.18); }
    .nav-item .left { display: flex; align-items: center; gap: 10px; }
    .nav-item .left i { width: 16px; text-align: center; font-size: 0.85rem; }
    .nav-item .arrow { font-size: 0.7rem; opacity: 0.7; }

    /* Overlay */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 89; }
    .sidebar-overlay.show { display: block; }

    /* ══ MAIN ══ */
    .main { margin-left: 188px; flex: 1; display: flex; flex-direction: column; }

    /* Student bar */
    .student-bar {
      background: #FFFACD; border-bottom: 2px solid #e0d060;
      padding: 8px 16px; display: flex; align-items: center; gap: 12px; min-height: 56px;
    }
    .student-bar .stu-img { width: 42px; height: 42px; object-fit: contain; flex-shrink: 0; }
    .student-bar .stu-name { font-size: 0.88rem; font-weight: 700; color: #222; }
    .student-bar .stu-class { font-size: 0.78rem; color: #555; margin-top: 1px; }

    /* ══ DASHBOARD BODY ══ */
    .dash-body { flex: 1; position: relative; overflow: hidden; min-height: 580px; }
    .wave-bg {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #fff0f5 0%, #fff8e8 18%, #f0fff4 35%, #f0f4ff 52%, #fff0fa 68%, #fffaf0 85%, #f5f0ff 100%);
      z-index: 0;
    }
    .wave-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

    /* ══ ICON GRID — Desktop 3 cols ══ */
    .icon-grid {
      position: relative; z-index: 2;
      display: grid; grid-template-columns: repeat(3, 1fr);
      padding: 30px 20px 20px 40px; max-width: 1000px;
    }
    .icon-tile {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 10px 10px; cursor: pointer; transition: transform 0.2s; text-decoration: none;
    }
    .icon-tile:hover { transform: translateY(-4px); }
    .icon-tile:active { transform: scale(0.96); }
    .tile-svg { width: 180px; height: 180px; }
    .tile-label { margin-top: 6px; font-size: 0.92rem; font-weight: 700; color: #e02020; }
    .tile-label-banner {
      margin-top: -10px; background: #e02020; color: #fff;
      font-size: 0.85rem; font-weight: 700; padding: 6px 28px; border-radius: 4px; letter-spacing: 0.04em;
    }

    /* Bottom nav hidden on desktop */
    .bottom-nav { display: none; }

    /* ══ MOBILE ≤640px ══ */
    @media (max-width: 640px) {
      /* Sidebar slides off-screen, toggled by hamburger */
      .sidebar { transform: translateX(-100%); width: 230px; box-shadow: 4px 0 24px rgba(0,0,0,0.3); }
      .sidebar.open { transform: translateX(0); }

      /* Full-width main, padding for bottom nav */
      .main { margin-left: 0; padding-bottom: 64px; }

      /* Compact student bar */
      .student-bar { padding: 6px 12px; min-height: 46px; gap: 8px; }
      .student-bar .stu-img { width: 32px; height: 32px; }
      .student-bar .stu-name { font-size: 0.76rem; }
      .student-bar .stu-class { font-size: 0.68rem; }

      /* 2-column icon grid */
      .icon-grid { grid-template-columns: repeat(2, 1fr); padding: 16px 10px 20px; max-width: 100%; }
      .icon-tile { padding: 14px 8px 8px; }
      .tile-svg { width: 115px; height: 115px; }
      .tile-label { font-size: 0.76rem; margin-top: 5px; }
      .tile-label-banner { font-size: 0.7rem; padding: 5px 12px; margin-top: -4px; }
      .header-title { font-size: 0.85rem; }

      /* Bottom navigation bar */
      .bottom-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        height: 60px; background: #1a1aff; z-index: 100;
        box-shadow: 0 -3px 12px rgba(0,0,0,0.25);
      }
      .bottom-nav a {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: rgba(255,255,255,0.65); font-size: 0.56rem; font-weight: 700;
        text-decoration: none; gap: 3px;
        border-right: 1px solid rgba(255,255,255,0.1); transition: background 0.15s; padding: 0 2px;
      }
      .bottom-nav a:last-child { border-right: none; }
      .bottom-nav a i { font-size: 1.1rem; }
      .bottom-nav a.active { color: #FFE135; background: rgba(255,255,255,0.1); }
      .bottom-nav a:active { background: rgba(255,255,255,0.18); }
    }

    @media (max-width: 360px) {
      .tile-svg { width: 96px; height: 96px; }
      .tile-label { font-size: 0.66rem; }
      .icon-grid { padding: 10px 4px 16px; }
    }
  </style>
</head>
