<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Student Login Area</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #e8e8ef;
    }

    .bg-watermark {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-watermark::before {
      content: '';
      position: absolute;
      left: -40px;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      height: 320px;
      background: url('https://www.vmhschool.com/assets/frontend/images/vmhs-logo-min.png') center/contain no-repeat;
      opacity: 0.15;
    }

    .wm-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-38%, -50%);
      font-size: 8vw;
      font-weight: 900;
      color: rgba(150,150,175,0.15);
      white-space: nowrap;
      letter-spacing: 6px;
      user-select: none;
      pointer-events: none;
      font-family: 'Poppins', sans-serif;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 440px;
      max-width: 94vw;
      border-radius: 22px;
      background: linear-gradient(170deg,
        #6650B8 0%,
        #7A52C5 20%,
        #9550CC 45%,
        #B44EC8 68%,
        #C43EC2 85%,
        #C83AB8 100%
      );
      box-shadow:
        0 24px 64px rgba(110, 60, 200, 0.40),
        0 4px 16px rgba(0,0,0,0.12);
      padding: 40px 44px 34px;
      text-align: center;
      animation: popIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.90) translateY(24px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .school-name {
      color: #FFE135;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .logo-wrap {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #fff;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.20);
      overflow: hidden;
    }

    .logo-wrap img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      border-radius: 50%;
    }

    .login-title {
      color: #fff;
      font-size: 1.12rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 26px;
    }

    .field {
      margin-bottom: 16px;
      text-align: left;
    }

    .field-icon {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      margin-bottom: 4px;
      display: block;
    }

    .field input {
      width: 100%;
      padding: 13px 15px;
      border: none;
      border-radius: 7px;
      background: rgba(210, 218, 255, 0.48);
      color: #1e0e40;
      font-family: 'Poppins', sans-serif;
      font-size: 0.97rem;
      font-weight: 500;
      outline: none;
      transition: background 0.2s;
    }

    .field input::placeholder {
      color: rgba(80, 55, 130, 0.55);
      font-weight: 400;
    }

    .field input:focus {
      background: rgba(228, 232, 255, 0.68);
    }

    .btn-login {
      display: inline-block;
      margin-top: 12px;
      padding: 13px 68px;
      background: #fff;
      color: #5a3fa0;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.20);
    }

    .btn-login:active { transform: translateY(0); }

    .hint {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #FFE135;
      font-weight: 600;
      line-height: 1.55;
      text-align: left;
    }
  </style>
</head>
<body>

  <div class="bg-watermark">
    <div class="wm-text">VIVEKANANDA&nbsp; MISSION&nbsp; HIGH&nbsp; SCHOOL</div>
  </div>

  <div class="card">

    <div class="school-name">Vivekananda Mission<br>High School</div>

    <div class="logo-wrap">
      <img
        src="https://www.vmhschool.com/assets/frontend/images/vmhs-logo-min.png"
        alt="VMHS"
        onerror="this.style.display='none'"
      />
    </div>

    <div class="login-title">Student Login</div>

    <form onsubmit="return doLogin(event)">

      <div class="field">
        <span class="field-icon">👤</span>
        <input type="text" id="sid" placeholder="Student ID" autocomplete="off"/>
      </div>

      <div class="field">
        <span class="field-icon">🔒</span>
        <input type="password" id="dob" placeholder="DD-MM-YYYY" autocomplete="off"/>
      </div>

      <center>
        <button type="submit" class="btn-login">Login</button>
      </center>

    </form>

    <div class="hint">
      If your Birthday is 1-5-2016 then you should enter 01-05-2016
    </div>

  </div>

  <script>
    function doLogin(e) {
      e.preventDefault();
      var sid = document.getElementById('sid').value.trim();
      var dob = document.getElementById('dob').value.trim();
      if (!sid || !dob) { alert('Please fill in all fields.'); return false; }
      alert('Logging in...\nStudent ID: ' + sid + '\nDOB: ' + dob);
    }
  </script>

</body>
</html>
